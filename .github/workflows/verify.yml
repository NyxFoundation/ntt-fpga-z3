name: verify
on:
  push:
  pull_request:
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: astral-sh/setup-uv@v5
      - name: formal verification (must print VERIFIED)
        run: uv run verify_radix2.py
      - name: INTT halving finding (reproduce + validate fix)
        run: uv run bug_intt_halving.py
      - name: non-vacuity mutation tests
        run: uv run mutation_test.py
      - name: deep full-basis N=1024 round-trip
        run: DEEP_VERIFY=1 uv run verify_radix2.py
      - name: proposed CFNTT-KRED — bit-exact math + e2e polymult
        run: uv run proposed/kred/kred_math.py
      - name: proposed CFNTT-KRED — z3 full-domain reduction proof
        run: uv run proposed/kred/verify_kred.py
      - name: proposed psi-fold ROM — math + e2e
        run: uv run proposed/rom-fold/rom_fold_math.py
      - name: proposed psi-fold ROM — z3 fold proof
        run: uv run proposed/rom-fold/verify_rom_fold.py
      - name: proposed psi-fold ROM — generated RTL in sync
        run: uv run proposed/rom-fold/gen_rom_fold.py && git diff --exit-code proposed/rom-fold/tf_rom_fold.v
      - name: install iverilog for full-core sim
        run: sudo apt-get update && sudo apt-get install -y iverilog
      - name: proposed full-transform RTL simulation (iverilog)
        run: uv run proposed/fullcore/run_stream.py
      - name: generalization — Proth-prime generator (Falcon + Kyber)
        run: uv run proposed/generator/kred_gen.py
      - name: generalization — generated Kyber RTL under iverilog
        run: uv run proposed/generator/gen_check.py
  yosys-formal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: YosysHQ/setup-oss-cad-suite@v3
      - name: SymbiYosys + LEC + audits (BMC tasks; see yosys/README.md)
        run: MODE=bmc yosys/run_all.sh
      - uses: astral-sh/setup-uv@v5
      - name: proposed suite — RTL proofs, audits, mutation sweep
        run: proposed/run_all.sh
